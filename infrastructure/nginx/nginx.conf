worker_processes auto;
error_log /var/log/nginx/error.log warn;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  limit_req_zone $binary_remote_addr zone=api:10m    rate=20r/s;
  limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
  limit_req_zone $binary_remote_addr zone=contact:10m rate=3r/m;

  upstream backend  { server backend:5000;  }
  upstream frontend { server frontend:80;   }

  server {
    listen 80;
    server_name _;

    # WebSocket — IoT live feed
    location /ws {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "Upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 3600;
    }

    # Auth login — strict rate limit
    location /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass       http://backend;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # Contact form — separate rate limit
    location /api/contact {
      limit_req zone=contact burst=3 nodelay;
      proxy_pass       http://backend;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # All other API routes
    location /api {
      limit_req zone=api burst=50 nodelay;
      proxy_pass       http://backend;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_read_timeout 60;
    }

    # Health check
    location /health {
      proxy_pass http://backend/health;
    }

    # Everything else — React SPA (website + platform)
    location / {
      proxy_pass       http://frontend;
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
    }
  }
}
